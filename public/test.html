<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            background: #e0e0e0;
        }
        main {
            flex: 1 0 auto;
            background: white;
            padding-bottom: 50px;
            /* The shadow at the bottom of main */
            box-shadow: 0 20px 40px rgba(0,0,0,1);
            position: relative;
            z-index: 10;
        }
        footer {
            /* This is the magic */
            position: sticky;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: #333;
            color: white;
            z-index: 1; /* Less than main */
        }
    </style>
</head>
<body>
    <main>
        <h1>Test Content</h1>
        <div style="height: 1500px;">Scrolling content</div>
        <p>End of content</p>
    </main>
    <footer>
        <h2>Sticky Footer</h2>
    </footer>
</body>
</html>
